docs_scaffold:
  trace_header: "# Traceability matrix\n\n"
  trace_table: "| REQ / group | PRD | SPEC | Notes |\n|-------------|-----|------|-------|\n"
  flows_index: "# Flow index\n\nAdd Mermaid sources under `docs/flows/` and reference them from the PRD/SPEC as `FLOW-*`.\n"
  changes_readme: |
    # Change lifecycle

    Open changes live in this folder; completed work is archived under `archive/`.
    Each change uses `proposal.md`, `design.md`, and `tasks.md` (see VerityDocs workflows).
  audit_readme: |
    # Audit pipeline

    Module mapping, per-module audits, and consolidated reports. Outputs go to `output/`.
  decisions_log: |
    # Decisions log

    Record technical decisions as `DEC-*` and reference them from SPEC files.
