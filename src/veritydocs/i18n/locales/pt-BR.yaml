docs_scaffold:
  trace_header: "# Matriz de Rastreabilidade\n\n"
  trace_table: "| REQ / grupo | PRD | SPEC | Notas |\n|-------------|-----|------|-------|\n"
  flows_index: "# Indice de flows\n\nAdicione fontes Mermaid em `docs/flows/` e referencie-as no PRD/SPEC como `FLOW-*`.\n"
  changes_readme: |
    # Ciclo de mudancas

    Changes abertos nesta pasta; trabalho concluido fica em `archive/`.
    Cada change usa `proposal.md`, `design.md` e `tasks.md` (ver workflows VerityDocs).
  audit_readme: |
    # Fluxo de auditoria

    Mapeamento por modulo, auditorias e relatorios consolidados. Saidas em `output/`.
  decisions_log: |
    # Decisions log

    Registe decisoes tecnicas como `DEC-*` e referencie-as nos ficheiros SPEC.
